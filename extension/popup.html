<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickCmd Vault Pro</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>QuickCmd Vault Pro</h1>
        <p>Popup repensée : navigation par pages, sans ascenseur</p>
      </div>
      <a class="link-button" href="options.html" target="_blank" rel="noreferrer">Gérer</a>
    </header>

    <section class="filters">
      <input id="searchInput" type="search" placeholder="Rechercher une commande..." />
      <div class="row">
        <select id="projectFilter"><option value="">Tous projets</option></select>
        <select id="categoryFilter"><option value="">Toutes catégories</option></select>
      </div>
    </section>

    <section class="mode-switch">
      <button id="showFavoritesBtn" class="chip active" type="button">Favoris</button>
      <button id="showRecentBtn" class="chip" type="button">Récents</button>
      <button id="clearFiltersButton" class="chip ghost" type="button">Reset</button>
    </section>

    <section class="results-head"><span class="count">Sync Chrome ☁️</span></section>

    <section class="results-head">
      <span id="resultsLabel">Tes commandes favorites</span>
      <span id="resultsCount" class="count"></span>
    </section>

    <section id="commandList" class="command-list"></section>

    <div id="emptyState" class="empty hidden">
      <h3>Rien à afficher</h3>
      <p>Essaie une recherche plus courte ou ouvre la gestion complète.</p>
    </div>

    <section class="pager">
      <button id="prevPageBtn" class="pager-btn" type="button">← Précédent</button>
      <span id="pageInfo" class="page-info">Page 1/1</span>
      <button id="nextPageBtn" class="pager-btn" type="button">Suivant →</button>
    </section>

    <footer class="footer">
      <button id="seedButton" class="secondary">Réinitialiser la base</button>
      <a class="footer-link" href="options.html" target="_blank" rel="noreferrer">Voir toute la bibliothèque →</a>
    </footer>

    <template id="commandCardTemplate">
      <article class="card">
        <div class="left">
          <div class="line1">
            <span class="title"></span>
            <span class="favorite hidden">★</span>
          </div>
          <div class="line2">
            <span class="project"></span>
            <span class="sep">•</span>
            <span class="category"></span>
          </div>
          <code class="command"></code>
        </div>
        <div class="actions">
          <button class="fav-btn" title="Favori">☆</button>
          <button class="copy-btn">Copier</button>
        </div>
      </article>
    </template>

    <div id="toast" class="toast hidden"></div>
  </main>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
